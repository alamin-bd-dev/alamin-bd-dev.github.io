<style>
.blog-card { cursor:pointer; }

.blog-img{
width:100%;
height:160px;
object-fit:cover;
border-radius:2px;
margin-bottom:1rem;
border:1px solid var(--card-border);
}

.blog-meta{
display:flex;
gap:1rem;
margin-bottom:0.7rem;
flex-wrap:wrap;
}

.blog-date{
color:var(--cyan);
font-size:0.75rem;
}

.blog-modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.92);
z-index:500;
overflow-y:auto;
padding:2rem 1rem;
}

.blog-modal.open{
display:block;
}

.blog-modal-inner{
max-width:720px;
margin:0 auto;
background:#030d03;
border:1px solid var(--green);
border-radius:4px;
padding:2rem;
}

.blog-modal-inner img{
width:100%;
border-radius:2px;
margin-bottom:1.5rem;
}

.blog-modal-inner h2{
font-family:var(--font-head);
color:var(--green);
font-size:1.4rem;
margin-bottom:0.5rem;
}

.blog-modal-inner .post-body{
color:var(--text-muted);
line-height:1.9;
font-size:0.9rem;
white-space:pre-wrap;
margin-top:1.5rem;
}

.blog-modal-close{
float:right;
background:none;
border:none;
color:var(--text-muted);
font-size:1.3rem;
cursor:pointer;
margin-top:-0.5rem;
}

.blog-modal-close:hover{
color:var(--red);
}
</style>

</head>

<section class="page-section">

<h1 class="section-title">Blog</h1>

<div id="blog-container" class="grid-3">
<p class="loading">&gt; Fetching blog posts...</p>
</div>

<div class="blog-modal-inner">

<button class="blog-modal-close" id="modal-close">✕</button>

</div>

<script type="module">

import { startMatrixRain } from './assets/js/matrix.js';
import { db } from './assets/js/firebase-config.js';
import { ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

startMatrixRain();



function formatDate(ts){
if(!ts) return '';
return new Date(ts).toLocaleDateString('en-US',{
year:'numeric',
month:'short',
day:'numeric'
});
}



async function loadBlogs(){

const container=document.getElementById('blog-container');

try{

const snap=await get(ref(db,'blogs'));

if(!snap.exists()){
container.innerHTML=
'<div class="empty-state" style="grid-column:1/-1">&gt; No posts yet. Check back soon!</div>';
return;
}

container.innerHTML='';

const data=snap.val();

const items=Object.keys(data).map(key=>({
key:key,
...data[key]
}));


items.sort((a,b)=>b.createdAt-a.createdAt);


items.forEach(d=>{

const card=document.createElement('div');
card.className='card blog-card';

card.innerHTML=`

${d.imageUrl ? `<img src="${d.imageUrl}" class="blog-img" alt="${d.title}">` : ''}

<div class="blog-meta">
<span class="blog-date">${formatDate(d.createdAt)}</span>
</div>

<h3>${d.title}</h3>

<p>${(d.content || '').substring(0,120)}...</p>

<button class="btn btn-sm" style="margin-top:0.8rem">
Read More
</button>

`;

card.addEventListener('click',()=>openPost(d));

container.appendChild(card);

});

}

catch(e){

container.innerHTML=
`<div class="empty-state" style="grid-column:1/-1">
&gt; Error: ${e.message}
</div>`;

}

}



function openPost(d){

document.getElementById('modal-content').innerHTML=`

${d.imageUrl ? `<img src="${d.imageUrl}" alt="${d.title}">` : ''}

<h2>${d.title}</h2>

<div class="blog-meta" style="margin-top:0.5rem">
<span class="blog-date">${formatDate(d.createdAt)}</span>
</div>

<div class="post-body">${d.content || ''}</div>

`;

document.getElementById('blog-modal').classList.add('open');

}



document
.getElementById('modal-close')
.addEventListener('click',()=>{

document
.getElementById('blog-modal')
.classList.remove('open');

});



loadBlogs();



const hamburger=document.getElementById('hamburger');
const mobileMenu=document.getElementById('mobile-menu');

hamburger.addEventListener('click',()=>{
mobileMenu.classList.toggle('open');
});

mobileMenu.querySelectorAll('a').forEach(a=>{
a.addEventListener('click',()=>{
mobileMenu.classList.remove('open');
});
});

</script>
