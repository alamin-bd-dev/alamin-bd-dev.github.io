<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog | Portfolio</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    .blog-card { cursor: pointer; }
    .blog-img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: 2px;
      margin-bottom: 1rem;
      border: 1px solid var(--card-border);
    }
    .blog-meta {
      display: flex;
      gap: 1rem;
      margin-bottom: 0.7rem;
      flex-wrap: wrap;
    }
    .blog-meta span { color: var(--text-muted); font-size: 0.75rem; }
    .blog-meta .blog-date { color: var(--cyan); }

    .blog-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 500;
      overflow-y: auto;
      padding: 2rem 1rem;
    }
    .blog-modal.open { display: block; }
    .blog-modal-inner {
      max-width: 720px;
      margin: 0 auto;
      background: #030d03;
      border: 1px solid var(--green);
      border-radius: 4px;
      padding: 2rem;
    }
    .blog-modal-inner img {
      width: 100%;
      border-radius: 2px;
      margin-bottom: 1.5rem;
    }
    .blog-modal-inner h2 {
      font-family: var(--font-head);
      color: var(--green);
      font-size: 1.4rem;
      margin-bottom: 0.5rem;
    }
    .blog-modal-inner .post-body {
      color: var(--text-muted);
      line-height: 1.9;
      font-size: 0.9rem;
      white-space: pre-wrap;
      margin-top: 1.5rem;
    }
    .blog-modal-close {
      float: right;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.3rem;
      cursor: pointer;
      margin-top: -0.5rem;
    }
    .blog-modal-close:hover { color: var(--red); }
  </style>
</head>
<body>
  <canvas id="matrix-canvas"></canvas>
  <nav>
    <a href="index.html" class="nav-logo">&lt;<span>DEV</span>/&gt;</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="skills.html">Skills</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a href="certificates.html">Certificates</a></li>
      <li><a href="blog.html" class="active">Blog</a></li>
    </ul>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </nav>
  <div class="mobile-menu" id="mobile-menu">
    <a href="index.html">Home</a><a href="about.html">About</a>
    <a href="skills.html">Skills</a><a href="projects.html">Projects</a>
    <a href="certificates.html">Certificates</a><a href="blog.html">Blog</a>
  </div>

  <div class="site-wrapper">
    <section class="page-section">
      <h1 class="section-title">Blog</h1>
      <div class="section-divider"></div>
      <div id="blog-container" class="grid-3">
        <p class="loading">&gt; Fetching blog posts...</p>
      </div>
    </section>
  </div>

  <div class="blog-modal" id="blog-modal">
    <div class="blog-modal-inner">
      <button class="blog-modal-close" id="modal-close">✕</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <script type="module">
    import { startMatrixRain } from './assets/js/matrix.js';
    import { db } from './assets/js/firebase-config.js';
    import { collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    startMatrixRain();

    function formatDate(ts) {
      if (!ts) return '';
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    async function loadBlogs() {
      const container = document.getElementById('blog-container');
      try {
        const snap = await getDocs(query(collection(db, 'blogs'), orderBy('createdAt', 'desc')));
        if (snap.empty) {
          container.innerHTML = '<div class="empty-state" style="grid-column:1/-1">&gt; No posts yet. Check back soon!</div>';
          return;
        }
        container.innerHTML = '';
        snap.forEach(doc => {
          const d = { id: doc.id, ...doc.data() };
          const card = document.createElement('div');
          card.className = 'card blog-card';
          card.innerHTML = `
            ${d.imageUrl ? `<img src="${d.imageUrl}" class="blog-img" alt="${d.title}">` : ''}
            <div class="blog-meta">
              <span class="blog-date">${formatDate(d.createdAt)}</span>
            </div>
            <h3>${d.title}</h3>
            <p>${(d.content || '').substring(0, 120)}...</p>
            <button class="btn btn-sm" style="margin-top:0.8rem">Read More</button>`;
          card.addEventListener('click', () => openPost(d));
          container.appendChild(card);
        });
      } catch(e) {
        container.innerHTML = `<div class="empty-state" style="grid-column:1/-1">&gt; Error: ${e.message}</div>`;
      }
    }

    function openPost(d) {
      document.getElementById('modal-content').innerHTML = `
        ${d.imageUrl ? `<img src="${d.imageUrl}" alt="${d.title}">` : ''}
        <h2>${d.title}</h2>
        <div class="blog-meta" style="margin-top:0.5rem">
          <span class="blog-date">${formatDate(d.createdAt)}</span>
        </div>
        <div class="post-body">${d.content || ''}</div>`;
      document.getElementById('blog-modal').classList.add('open');
    }

    document.getElementById('modal-close').addEventListener('click', () => {
      document.getElementById('blog-modal').classList.remove('open');
    });

    loadBlogs();
    document.getElementById('hamburger').addEventListener('click', () => {
      document.getElementById('mobile-menu').classList.toggle('open');
    });
  </script>
</body>
</html>
