<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tools</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    .project-card { display: flex; flex-direction: column; }
    .project-img { width: 100%; height: 160px; object-fit: cover; border-radius: 2px; margin-bottom: 1rem; border: 1px solid var(--card-border); }
    .project-img-placeholder { width: 100%; height: 160px; background: var(--bg3); display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 0.75rem; letter-spacing: 2px; margin-bottom: 1rem; border: 1px solid var(--card-border); }
    .project-links { display: flex; gap: 0.6rem; margin-top: auto; padding-top: 1rem; flex-wrap: wrap; }
    .project-tags { display: flex; flex-wrap: wrap; margin: 0.5rem 0; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 500; align-items: center; justify-content: center; padding: 2rem; }
    .modal-overlay.open { display: flex; }
    .modal { background: #030d03; border: 1px solid var(--green); border-radius: 4px; max-width: 600px; width: 100%; padding: 2rem; position: relative; max-height: 80vh; overflow-y: auto; }
    .modal-close { position: absolute; top: 1rem; right: 1rem; background: none; border: none; color: var(--text-muted); font-size: 1.2rem; cursor: pointer; }
    .modal-close:hover { color: var(--red); }
    .modal h2 { font-family: var(--font-head); color: var(--cyan); margin-bottom: 1rem; }
    .modal p { color: var(--text-muted); line-height: 1.8; font-size: 0.9rem; }
  </style>
</head>
<body>
  <canvas id="matrix-canvas"></canvas>
  <nav>
    <a href="index.html" class="nav-logo">&lt;<span> 4l 4M1n </span>/&gt;</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="skills.html">Skills</a></li>
      <li><a href="projects.html" class="active">Tools</a></li>
      <li><a href="certificates.html">Certificates</a></li>
      <li><a href="blog.html">Blog</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </nav>
  <div class="mobile-menu" id="mobile-menu">
    <a href="index.html">Home</a><a href="skills.html">Skills</a>
    <a href="projects.html">Tools</a><a href="certificates.html">Certificates</a>
    <a href="blog.html">Blog</a><a href="about.html">About</a>
  </div>

  <div class="site-wrapper">
    <section class="page-section">
      <h1 class="section-title">Tools</h1>
      <div class="section-divider"></div>
      <div id="projects-container" class="grid-3"><p class="loading">&gt; Fetching tools files...</p></div>
    </section>
  </div>

  <div class="modal-overlay" id="project-modal">
    <div class="modal">
      <button class="modal-close" id="modal-close">✕</button>
      <h2 id="modal-title"></h2>
      <div id="modal-body"></div>
    </div>
  </div>

  <script type="module">
    import { startMatrixRain } from './assets/js/matrix.js';
    import { db } from './assets/js/firebase-config.js';
    import { ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    startMatrixRain();

    async function loadProjects() {
      const container = document.getElementById('projects-container');
      try {
        const snap = await get(ref(db, 'projects'));
        if (!snap.exists()) {
          container.innerHTML = '<div class="empty-state" style="grid-column:1/-1">&gt; No projects yet. Add via admin dashboard.</div>';
          return;
        }
        container.innerHTML = '';
        // newest first
        const items = [];
        snap.forEach(child => items.push({ key: child.key, ...child.val() }));
        items.reverse();

        items.forEach(d => {
          const tags = (d.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
          const about = d.about || '';
          const card = document.createElement('div');
          card.className = 'card project-card';
          card.innerHTML = `
            ${d.imageUrl ? `<img src="${d.imageUrl}" class="project-img" alt="${d.name}" onerror="this.style.display='none'">` : `<div class="project-img-placeholder">// PROJECT IMAGE</div>`}
            <h3>${d.name}</h3>
            <p>${about.substring(0, 120)}${about.length > 120 ? '...' : ''}</p>
            <div class="project-tags">${tags}</div>
            <div class="project-links">
              <button class="btn btn-sm" onclick="showModal(\`${d.name.replace(/`/g,'')}\`,\`${about.replace(/`/g,'')}\`)">Details</button>
              ${d.liveUrl ? `<a href="${d.liveUrl}" target="_blank" class="btn btn-sm" style="border-color:var(--cyan);color:var(--cyan)">Live</a>` : ''}
              ${d.githubUrl ? `<a href="${d.githubUrl}" target="_blank" class="btn btn-sm" style="border-color:var(--amber);color:var(--amber)">GitHub</a>` : ''}
            </div>`;
          container.appendChild(card);
        });
      } catch(e) {
        container.innerHTML = `<div class="empty-state" style="grid-column:1/-1">&gt; Error: ${e.message}</div>`;
      }
    }

    window.showModal = function(name, about) {
      document.getElementById('modal-title').textContent = name;
      document.getElementById('modal-body').innerHTML = `<p>${about || 'No additional details.'}</p>`;
      document.getElementById('project-modal').classList.add('open');
    };
    document.getElementById('modal-close').addEventListener('click', () => document.getElementById('project-modal').classList.remove('open'));
    document.getElementById('project-modal').addEventListener('click', e => { if (e.target===e.currentTarget) e.currentTarget.classList.remove('open'); });

    loadProjects();
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobile-menu');
    hamburger.addEventListener('click', () => mobileMenu.classList.toggle('open'));
    mobileMenu.querySelectorAll('a').forEach(a => a.addEventListener('click', () => mobileMenu.classList.remove('open')));
  </script>
  <footer class="site-footer">
    &lt;<span>&copy; 2025-2026 Al Amin. All Rights Reserved</span>&gt;
    <div class="footer-copy">Cybersecurity Enthusiast | Bug Hunter | Future Red Teamer</div>
  </footer>
</body>
</html>
