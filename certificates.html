<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certificates </title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    .cert-card { text-align: center; }
    .cert-img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border: 1px solid var(--card-border);
      border-radius: 2px;
      margin-bottom: 1rem;
      transition: opacity 0.2s;
    }
    .cert-img:hover { opacity: 0.85; }
    .cert-img-placeholder {
      width: 100%;
      height: 180px;
      background: var(--bg3);
      border: 1px dashed var(--card-border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 2rem;
      margin-bottom: 1rem;
    }
    .cert-issuer { color: var(--text-muted); font-size: 0.78rem; margin-top: 0.3rem; }
    .cert-date { color: var(--amber); font-size: 0.75rem; margin-top: 0.3rem; }

    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 600;
      align-items: center;
      justify-content: center;
    }
    .lightbox.open { display: flex; }
    .lightbox img {
      max-width: 90vw;
      max-height: 85vh;
      border: 1px solid var(--green);
      border-radius: 4px;
    }
    .lightbox-close {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      background: none;
      border: none;
      color: var(--text);
      font-size: 1.5rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <canvas id="matrix-canvas"></canvas>
  <nav>
    <a href="index.html" class="nav-logo">&lt;<span> 4l 4M1n </span>/&gt;</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="skills.html">Skills</a></li>
      <li><a href="projects.html">Tools</a></li>
      <li><a href="certificates.html">Certificates</a></li>
      <li><a href="blog.html" class="active">Blog</a></li>
      <li><a href="about.html" class="active">About</a></li>
    </ul>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </nav>
  <div class="mobile-menu" id="mobile-menu">
    <a href="index.html">Home</a><a href="skills.html">Skills</a>
    <a href="projects.html">ools</a><a href="certificates.html">Certificates</a>
    <a href="blog.html">Blog</a><a href="about.html">About</a>
  </div>

  <div class="site-wrapper">
    <section class="page-section">
      <h1 class="section-title">Certificates</h1>
      <div class="section-divider"></div>
      <div id="certs-container" class="grid-3">
        <p class="loading">&gt; Loading certificates...</p>
      </div>
    </section>
  </div>

  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lb-close">✕</button>
    <img id="lb-img" src="" alt="Certificate" />
  </div>

  <script type="module">
    import { startMatrixRain } from './assets/js/matrix.js';
    import { db } from './assets/js/firebase-config.js';
    import { collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    startMatrixRain();

    async function loadCerts() {
      const container = document.getElementById('certs-container');
      try {
        const snap = await getDocs(query(collection(db, 'certificates'), orderBy('createdAt', 'desc')));
        if (snap.empty) {
          container.innerHTML = '<div class="empty-state" style="grid-column:1/-1">&gt; No certificates yet.</div>';
          return;
        }
        container.innerHTML = '';
        snap.forEach(doc => {
          const d = doc.data();
          const card = document.createElement('div');
          card.className = 'card cert-card';
          card.innerHTML = `
            ${d.imageUrl
              ? `<img src="${d.imageUrl}" class="cert-img" alt="${d.name}" onclick="openLightbox('${d.imageUrl}')" style="cursor:zoom-in">`
              : `<div class="cert-img-placeholder">🏆</div>`}
            <h3>${d.name}</h3>
            ${d.about ? `<p>${d.about}</p>` : ''}
            <div class="cert-issuer">${d.issuer || ''}</div>
            <div class="cert-date">${d.date || ''}</div>
            ${d.link ? `<a href="${d.link}" target="_blank" class="btn btn-sm" style="margin-top:0.8rem">View Certificate</a>` : ''}
          `;
          container.appendChild(card);
        });
      } catch(e) {
        container.innerHTML = `<div class="empty-state" style="grid-column:1/-1">&gt; Error: ${e.message}</div>`;
      }
    }

    window.openLightbox = function(src) {
      document.getElementById('lb-img').src = src;
      document.getElementById('lightbox').classList.add('open');
    };
    document.getElementById('lb-close').addEventListener('click', () => {
      document.getElementById('lightbox').classList.remove('open');
    });
    document.getElementById('lightbox').addEventListener('click', e => {
      if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
    });

    loadCerts();
    document.getElementById('hamburger').addEventListener('click', () => {
      document.getElementById('mobile-menu').classList.toggle('open');
    });
  </script>
</body>
</html>
