<style>

.cert-card{
text-align:center;
}

.cert-img{
width:100%;
height:180px;
object-fit:cover;
border:1px solid var(--card-border);
border-radius:2px;
margin-bottom:1rem;
cursor:zoom-in;
transition:opacity .2s;
}

.cert-img:hover{
opacity:.85;
}

.cert-img-placeholder{
width:100%;
height:180px;
background:var(--bg3);
border:1px dashed var(--card-border);
display:flex;
align-items:center;
justify-content:center;
color:var(--text-muted);
font-size:2rem;
margin-bottom:1rem;
}

.cert-issuer{
color:var(--text-muted);
font-size:.78rem;
margin-top:.3rem;
}

.cert-date{
color:var(--amber);
font-size:.75rem;
margin-top:.3rem;
}

.lightbox{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.95);
z-index:600;
align-items:center;
justify-content:center;
}

.lightbox.open{
display:flex;
}

.lightbox img{
max-width:90vw;
max-height:85vh;
border:1px solid var(--green);
border-radius:4px;
}

.lightbox-close{
position:fixed;
top:1.5rem;
right:1.5rem;
background:none;
border:none;
color:var(--text);
font-size:1.5rem;
cursor:pointer;
}

</style>

<section class="page-section">

<h1 class="section-title">Certificates</h1>
<div class="section-divider"></div>

<div id="certs-container" class="grid-3">

<p class="loading">&gt; Loading certificates...</p>

</div>

</section>

</div>


<div class="lightbox" id="lightbox">

<button class="lightbox-close" id="lb-close">✕</button>

<img id="lb-img" src="" alt="Certificate">

</div>



<script type="module">

import { startMatrixRain } from './assets/js/matrix.js'
import { db } from './assets/js/firebase-config.js'
import { ref,get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"


startMatrixRain()


async function loadCertificates(){

const container=document.getElementById("certs-container")

try{

const snapshot=await get(ref(db,"certificates"))

if(!snapshot.exists()){

container.innerHTML=`<div class="empty-state" style="grid-column:1/-1">> No certificates yet</div>`

return

}

container.innerHTML=""

let certs=[]

snapshot.forEach(child=>{

certs.push(child.val())

})

certs.reverse()

certs.forEach(data=>{

const card=document.createElement("div")

card.className="card cert-card"

card.innerHTML=`

${data.imageUrl
?`<img src="${data.imageUrl}" class="cert-img" onclick="openLightbox('${data.imageUrl}')">`
:`<div class="cert-img-placeholder">🏆</div>`
}

<h3>${data.name || ""}</h3>

${data.about?`<p>${data.about}</p>`:""}

<div class="cert-issuer">${data.issuer || ""}</div>

<div class="cert-date">${data.date || ""}</div>

${data.link
?`<a href="${data.link}" target="_blank" class="btn btn-sm" style="margin-top:0.8rem">View Certificate</a>`
:""}

`

container.appendChild(card)

})

}

catch(err){

container.innerHTML=`<div class="empty-state" style="grid-column:1/-1">> ${err.message}</div>`

}

}



window.openLightbox=function(src){

document.getElementById("lb-img").src=src

document.getElementById("lightbox").classList.add("open")

}



document.getElementById("lb-close").onclick=function(){

document.getElementById("lightbox").classList.remove("open")

}



document.getElementById("lightbox").onclick=function(e){

if(e.target===this){

this.classList.remove("open")

}

}



loadCertificates()



const hamburger=document.getElementById("hamburger")
const mobileMenu=document.getElementById("mobile-menu")

hamburger.onclick=()=>{

mobileMenu.classList.toggle("open")

}

mobileMenu.querySelectorAll("a").forEach(link=>{

link.onclick=()=>mobileMenu.classList.remove("open")

})

</script>
