<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skills </title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    .skill-category { margin-bottom: 3rem; }
    .category-title { font-family: var(--font-head); color: var(--cyan); font-size: 0.9rem; letter-spacing: 2px; margin-bottom: 1.2rem; }
    .skills-grid { display: flex; flex-wrap: wrap; gap: 1rem; }
    .skill-card {
      background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 4px; padding: 1rem 1.5rem; min-width: 160px;
      transition: border-color 0.3s, transform 0.2s; cursor: default;
    }
    .skill-card:hover { border-color: var(--green); transform: translateY(-3px); }
    .skill-name { color: var(--green); font-family: var(--font-head); font-size: 0.85rem; margin-bottom: 0.5rem; letter-spacing: 1px; }
    .skill-about { color: var(--text-muted); font-size: 0.75rem; line-height: 1.5; }
    .skill-bar-wrap { height: 3px; background: rgba(0,255,65,0.1); border-radius: 2px; margin-top: 0.7rem; overflow: hidden; }
    .skill-bar { height: 100%; background: linear-gradient(to right, var(--dark-green), var(--green)); border-radius: 2px; width: 0; transition: width 1s ease; }
  </style>
</head>
<body>
  <canvas id="matrix-canvas"></canvas>
  <nav>
    <a href="index.html" class="nav-logo">&lt;<span> 4l 4M1n </span>/&gt;</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="skills.html" class="active">Skills</a></li>
      <li><a href="projects.html">Tools</a></li>
      <li><a href="certificates.html">Certificates</a></li>
      <li><a href="blog.html">Blog</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </nav>
  <div class="mobile-menu" id="mobile-menu">
    <a href="index.html">Home</a><a href="skills.html">Skills</a>
    <a href="projects.html">Tools</a><a href="certificates.html">Certificates</a>
    <a href="blog.html">Blog</a><a href="about.html">About</a>
  </div>

  <div class="site-wrapper">
    <section class="page-section">
      <h1 class="section-title">Skills</h1>
      <div class="section-divider"></div>
      <div id="skills-container"><p class="loading">&gt; Loading skills database...</p></div>
    </section>
  </div>

  <script type="module">
    import { startMatrixRain } from './assets/js/matrix.js';
    import { db } from './assets/js/firebase-config.js';
    import { ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    startMatrixRain();

    async function loadSkills() {
      const container = document.getElementById('skills-container');
      try {
        const snap = await get(ref(db, 'skills'));
        if (!snap.exists()) {
          container.innerHTML = '<div class="empty-state">&gt; No skills found. Add via admin dashboard.</div>';
          return;
        }
        const grouped = {};
        snap.forEach(child => {
          const d = child.val();
          const cat = d.category || 'General';
          if (!grouped[cat]) grouped[cat] = [];
          grouped[cat].push(d);
        });
        container.innerHTML = '';
        for (const [cat, skills] of Object.entries(grouped)) {
          const sec = document.createElement('div');
          sec.className = 'skill-category';
          sec.innerHTML = `<div class="category-title">// ${cat.toUpperCase()}</div>
            <div class="skills-grid">${skills.map(s => `
              <div class="skill-card">
                <div class="skill-name">${s.name}</div>
                ${s.about ? `<div class="skill-about">${s.about}</div>` : ''}
                <div class="skill-bar-wrap"><div class="skill-bar" data-level="${s.level || 75}"></div></div>
              </div>`).join('')}
            </div>`;
          container.appendChild(sec);
        }
        setTimeout(() => {
          document.querySelectorAll('.skill-bar').forEach(b => b.style.width = (b.dataset.level || 75) + '%');
        }, 200);
      } catch(e) {
        container.innerHTML = `<div class="empty-state">&gt; Error: ${e.message}</div>`;
      }
    }
    loadSkills();

    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobile-menu');
    hamburger.addEventListener('click', () => mobileMenu.classList.toggle('open'));
    mobileMenu.querySelectorAll('a').forEach(a => a.addEventListener('click', () => mobileMenu.classList.remove('open')));
  </script>
  <footer class="site-footer">
    &lt;<span>&copy; 2025-2026 Al Amin. All Rights Reserved</span>&gt;
    <div class="footer-copy">Cybersecurity Enthusiast | Bug Hunter | Future Red Teamer</div>
  </footer>
</body>
</html>
