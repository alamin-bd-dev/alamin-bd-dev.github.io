<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | Portfolio</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box {
      width: 100%;
      max-width: 420px;
      padding: 2.5rem;
      background: rgba(0,0,0,0.9);
      border: 1px solid var(--green);
      border-radius: 4px;
      position: relative;
      z-index: 1;
    }
    .login-logo {
      font-family: var(--font-head);
      color: var(--green);
      font-size: 1.4rem;
      text-align: center;
      margin-bottom: 0.3rem;
      letter-spacing: 3px;
    }
    .login-sub {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.78rem;
      margin-bottom: 2rem;
      letter-spacing: 2px;
    }
    .error-msg {
      color: var(--red);
      font-size: 0.82rem;
      margin-bottom: 1rem;
      padding: 0.6rem;
      border: 1px solid rgba(255,51,51,0.3);
      background: rgba(255,51,51,0.05);
      border-radius: 2px;
      display: none;
    }
    .login-btn {
      width: 100%;
      padding: 0.85rem;
      background: transparent;
      border: 1px solid var(--green);
      color: var(--green);
      font-family: var(--font-main);
      font-size: 0.9rem;
      letter-spacing: 2px;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
      border-radius: 2px;
    }
    .login-btn:hover {
      background: var(--green);
      color: #000;
      box-shadow: 0 0 20px rgba(0,255,65,0.3);
    }
    .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(5px); }
    }
    .corner { position: absolute; width: 10px; height: 10px; border-color: var(--cyan); border-style: solid; }
    .corner-tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .corner-tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
    .corner-bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
    .corner-br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
  </style>
</head>
<body>
  <canvas id="matrix-canvas"></canvas>
  <div class="login-box">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
    <div class="login-logo">ADMIN ACCESS</div>
    <div class="login-sub">// AUTHORIZED PERSONNEL ONLY</div>
    <div class="error-msg" id="error-msg"></div>
    <div class="input-group">
      <label>EMAIL</label>
      <input type="email" id="email" placeholder="admin@email.com" autocomplete="email" />
    </div>
    <div class="input-group">
      <label>PASSWORD</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="login-btn" id="login-btn">[ LOGIN ]</button>
  </div>
  <div id="toast"></div>

  <script type="module">
    import { startMatrixRain } from '../assets/js/matrix.js';
    import { auth } from '../assets/js/firebase-config.js';
    import { signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    startMatrixRain();

    // যদি আগে থেকেই logged in থাকে সরাসরি dashboard এ পাঠাও
    onAuthStateChanged(auth, user => {
      if (user) window.location.replace('dashboard.html');
    });

    // Firebase error code কে বাংলা/সহজ message এ রূপান্তর
    function getFriendlyError(code) {
      switch (code) {
        case 'auth/invalid-email':
          return '> ভুল Email format। সঠিক email দিন।';
        case 'auth/user-not-found':
        case 'auth/invalid-credential':
        case 'auth/wrong-password':
          return '> Email বা Password ভুল। আবার চেষ্টা করুন।';
        case 'auth/too-many-requests':
          return '> অনেকবার ভুল হয়েছে। কিছুক্ষণ পর চেষ্টা করুন।';
        case 'auth/user-disabled':
          return '> এই account টি disabled করা হয়েছে।';
        case 'auth/network-request-failed':
          return '> Internet connection সমস্যা। আবার চেষ্টা করুন।';
        default:
          return '> Login ব্যর্থ হয়েছে। আবার চেষ্টা করুন।';
      }
    }

    function showError(msg) {
      const errEl = document.getElementById('error-msg');
      errEl.textContent = msg;
      errEl.style.display = 'block';
      // shake animation
      errEl.style.animation = 'none';
      errEl.offsetHeight; // reflow
      errEl.style.animation = 'shake 0.4s ease';
    }

    function hideError() {
      document.getElementById('error-msg').style.display = 'none';
    }

    async function doLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');

      hideError();

      // client-side validation
      if (!email && !password) {
        showError('> Email এবং Password দিন।');
        return;
      }
      if (!email) {
        showError('> Email দিন।');
        return;
      }
      if (!password) {
        showError('> Password দিন।');
        return;
      }
      if (password.length < 6) {
        showError('> Password কমপক্ষে ৬ অক্ষরের হতে হবে।');
        return;
      }

      btn.disabled = true;
      btn.textContent = '[ VERIFYING... ]';

      try {
        await signInWithEmailAndPassword(auth, email, password);
        btn.textContent = '[ ACCESS GRANTED ✓ ]';
        btn.style.background = 'var(--green)';
        btn.style.color = '#000';
        setTimeout(() => window.location.replace('dashboard.html'), 600);
      } catch(e) {
        showError(getFriendlyError(e.code));
        btn.disabled = false;
        btn.textContent = '[ LOGIN ]';
        btn.style.background = '';
        btn.style.color = '';
      }
    }

    document.getElementById('login-btn').addEventListener('click', doLogin);
    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
    document.getElementById('email').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('password').focus();
    });

    // input এ টাইপ করলে error লুকিয়ে যাবে
    ['email','password'].forEach(id => {
      document.getElementById(id).addEventListener('input', hideError);
    });
  </script>
</body>
</html>
