<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Dashboard | Portfolio</title>
<link rel="stylesheet" href="../assets/css/style.css" />

<style>
body { background: var(--bg); visibility: hidden; }
body.auth-ready { visibility: visible; }

#auth-gate {
position: fixed; inset: 0; background: #000; z-index: 9999;
display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.2rem;
}

#auth-gate.hidden { display: none; }

.gate-logo {
font-family: 'Orbitron', monospace;
color: #00ff41;
font-size: 1.3rem;
letter-spacing: 4px;
}

.gate-msg {
color: #5a9a5a;
font-family: 'Share Tech Mono', monospace;
font-size: 0.85rem;
letter-spacing: 2px;
}

.gate-bar {
width: 200px;
height: 2px;
background: rgba(0,255,65,0.15);
overflow: hidden;
}

.gate-bar-fill {
height: 100%;
width: 100%;
background: #00ff41;
}

.dash-layout { display: flex; min-height: 100vh; }

.sidebar { width: 230px; position: fixed; background: rgba(0,15,0,0.95); }

.dash-main { margin-left: 230px; padding: 2rem; }

.panel { display: none; }
.panel.active { display: block; }

.panel.active { display:block; }

.list-item {
background: var(--card-bg);
border: 1px solid var(--card-border);
padding: 1rem;
display: flex;
justify-content: space-between;
margin-bottom: 0.6rem;
}

.list-item-img {
width: 60px;
height: 45px;
object-fit: cover;
}
</style>
</head>

<body>

<div id="auth-gate">
<div class="gate-logo">ADMIN PANEL</div>
<div class="gate-msg">VERIFYING...</div>
<div class="gate-bar"><div class="gate-bar-fill"></div></div>
</div>

<div class="dash-layout">

<aside class="sidebar">
<ul>
<li><a href="#" data-panel="overview" class="active">Overview</a></li>
<li><a href="#" data-panel="blogs">Blogs</a></li>
</ul>
</aside>

<main class="dash-main">

<!-- BLOGS -->
<div class="panel active" id="panel-blogs">

<h2>CREATE BLOG</h2>

<input id="blog-title" placeholder="Title">
<textarea id="blog-content" placeholder="Content"></textarea>
<input type="file" id="blog-img">

<button id="add-blog-btn">Publish</button>

<h3>ALL BLOGS</h3>
<div id="blogs-list"></div>

</div>

</main>
</div>

<div id="toast"></div>

<script type="module">

import { auth, db } from '../assets/js/firebase-config.js';
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { ref, get, set, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const dbRef = ref;

onAuthStateChanged(auth, user => {
if (!user) window.location.replace("login.html");
else {
document.body.classList.add("auth-ready");
document.getElementById("auth-gate").classList.add("hidden");
loadBlogs();
}
});

function toast(msg){
alert(msg);
}

/* LOAD BLOGS - FIXED */
async function loadBlogs(){
const list = document.getElementById("blogs-list");

const snap = await get(dbRef(db,"blogs"));

if(!snap.exists()){
list.innerHTML = "<p>No blogs</p>";
return;
}

list.innerHTML = "";

const items = [];

snap.forEach(child=>{
items.push({ key: child.key, ...child.val() });
});

/* FIXED SORT */
items.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));

items.forEach(d=>{
const div = document.createElement("div");
div.className = "list-item";

div.innerHTML = `
<div style="display:flex;gap:10px;align-items:center">
${d.imageUrl ? `<img src="${d.imageUrl}" class="list-item-img">` : ""}

<div>
<strong>${d.title || "No title"}</strong>
<p>${(d.content || "").substring(0,80)}...</p>
</div>
</div>

<button data-key="${d.key}" data-col="blogs">Delete</button>
`;

list.appendChild(div);
});

attachDelete(list);
}

/* ADD BLOG - FIXED */
document.getElementById("add-blog-btn").addEventListener("click", async ()=>{

const title = document.getElementById("blog-title").value.trim();
const content = document.getElementById("blog-content").value.trim();

if(!title || !content) return toast("Fill all fields");

const newRef = push(dbRef(db,"blogs"));

await set(newRef,{
title,
content,
imageUrl:"",
createdAt: Date.now()
});

toast("Blog added");

loadBlogs();
});

/* DELETE FIXED */
function attachDelete(container){
container.querySelectorAll("button").forEach(btn=>{
btn.onclick = async ()=>{
await remove(dbRef(db,`blogs/${btn.dataset.key}`));
toast("Deleted");
loadBlogs();
};
});
}

</script>

</body>
</html>
