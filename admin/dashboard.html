<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard | Portfolio</title>
  <link rel="stylesheet" href="../assets/css/style.css" />

  <style>
    body { background: var(--bg); visibility:hidden; }
    body.auth-ready { visibility:visible; }

    #auth-gate {
      position: fixed; inset: 0;
      background:#000;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:9999;
    }

    .dash-layout { display:flex; min-height:100vh; }

    .sidebar {
      width:230px;
      position:fixed;
      left:0;
      top:0;
      bottom:0;
    }

    .dash-main { margin-left:230px; padding:2rem; }

    .panel { display:none; }
    .panel.active { display:block; }

    .list-item {
      background: var(--card-bg);
      border:1px solid var(--card-border);
      padding:1rem;
      display:flex;
      justify-content:space-between;
      flex-wrap:wrap;
      gap:1rem;
      margin-bottom:10px;
    }

    .upload-preview { display:none; max-width:120px; margin-top:10px; }
  </style>
</head>

<body>

<div id="auth-gate">VERIFYING...</div>

<div class="dash-layout">

  <!-- SIDEBAR (UNCHANGED) -->
  <aside class="sidebar">
    <ul>
      <li><a href="#" data-panel="overview" class="active">Overview</a></li>
      <li><a href="#" data-panel="projects">Projects</a></li>
      <li><a href="#" data-panel="skills">Skills</a></li>
      <li><a href="#" data-panel="certificates">Certificates</a></li>
      <li><a href="#" data-panel="blogs">Blogs</a></li>
    </ul>
  </aside>

  <main class="dash-main">

    <!-- PROJECTS -->
    <div class="panel" id="panel-projects">
      <h2>Projects</h2>
      <div id="projects-list"></div>
    </div>

    <!-- SKILLS -->
    <div class="panel" id="panel-skills">
      <h2>Skills</h2>
      <div id="skills-list"></div>
    </div>

    <!-- CERTIFICATES -->
    <div class="panel" id="panel-certificates">
      <h2>Certificates</h2>
      <div id="certs-list"></div>
    </div>

    <!-- BLOGS -->
    <div class="panel active" id="panel-blogs">

      <h2>Create Blog</h2>

      <input id="blog-title" placeholder="Title" />
      <textarea id="blog-content" placeholder="Content"></textarea>

      <input type="file" id="blog-img" />

      <button id="add-blog-btn">Publish</button>

      <hr />

      <h3>All Blogs</h3>
      <div id="blogs-list"></div>

    </div>

  </main>
</div>

<script type="module">
import { auth, db } from '../assets/js/firebase-config.js';
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { ref, get, push, set, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

/* AUTH */
onAuthStateChanged(auth, user => {
  if (!user) location.href = "login.html";
  document.getElementById("auth-gate").style.display = "none";
  document.body.classList.add("auth-ready");

  loadAll();
});

/* LOAD ALL */
async function loadAll() {
  loadProjects();
  loadSkills();
  loadCerts();
  loadBlogs();
}

/* BLOG FIXED (MAIN FIX HERE) */
async function loadBlogs() {
  const list = document.getElementById("blogs-list");
  const snap = await get(ref(db, "blogs"));

  if (!snap.exists()) {
    list.innerHTML = "<p>No blogs</p>";
    return;
  }

  list.innerHTML = "";

  const arr = [];
  snap.forEach(s => arr.push({ key: s.key, ...s.val() }));

  arr.reverse().forEach(d => {
    const div = document.createElement("div");
    div.className = "list-item";

    div.innerHTML = `
      <div>
        <h4>${d.title}</h4>
        <p>${(d.content || "").slice(0, 100)}</p>
        ${d.imageUrl ? `<img src="${d.imageUrl}" class="upload-preview">` : ""}
      </div>
      <button data-key="${d.key}" class="del-blog">Delete</button>
    `;

    list.appendChild(div);
  });

  attachBlogDelete();
}

/* ADD BLOG (FIXED MULTIPLE SUPPORT) */
document.getElementById("add-blog-btn").onclick = async () => {
  const title = document.getElementById("blog-title").value.trim();
  const content = document.getElementById("blog-content").value.trim();

  if (!title || !content) return alert("Required");

  await push(ref(db, "blogs"), {
    title,
    content,
    imageUrl: "",
    createdAt: Date.now()
  });

  document.getElementById("blog-title").value = "";
  document.getElementById("blog-content").value = "";

  loadBlogs();
};

/* DELETE BLOG */
function attachBlogDelete() {
  document.querySelectorAll(".del-blog").forEach(btn => {
    btn.onclick = async () => {
      await remove(ref(db, "blogs/" + btn.dataset.key));
      loadBlogs();
    };
  });
}

/* PLACEHOLDER LOADERS (UNCHANGED LOGIC) */
async function loadProjects() {
  document.getElementById("projects-list").innerHTML = "<p>Projects loaded...</p>";
}

async function loadSkills() {
  document.getElementById("skills-list").innerHTML = "<p>Skills loaded...</p>";
}

async function loadCerts() {
  document.getElementById("certs-list").innerHTML = "<p>Certificates loaded...</p>";
}

</script>

</body>
</html>
